name: Java CI with Maven & Serenity

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas y generar reporte Serenity
        run: mvn -B clean verify

      - name: Subir Reporte Serenity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-serenity-bookingya
          path: target/site/serenity/
          if-no-files-found: error

      - name: Configurar GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Preparar reporte para GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/serenity/

      - name: Publicar reporte Serenity en GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Resumen del reporte
        if: always()
        run: |
          echo "## Reporte Serenity" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: reporte-serenity-bookingya" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deployment.outputs.page_url }}" != "" ]; then
            echo "- GitHub Pages: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          fi
